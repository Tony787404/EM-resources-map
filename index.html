<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Emerging Minds Resource Explorer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Resource database</p>
        <h1>Emerging Minds Explorer</h1>
      </div>
      <a class="source-link" href="https://emergingminds.com.au/resources/library/" target="_blank" rel="noreferrer">Open source site</a>
    </header>

    <main class="shell">
      <section class="summary" id="summary"></section>

      <section class="workspace">
        <aside class="filters" aria-label="Filters">
          <div class="filter-head">
            <h2>Filters</h2>
            <button id="clearFilters" type="button">Clear</button>
          </div>
          <div class="filter-block">
            <h3>Collection</h3>
            <div id="groupFilters" class="check-list"></div>
          </div>
          <div class="filter-block">
            <h3>Type</h3>
            <div id="typeFilters" class="check-list tall"></div>
          </div>
          <div class="filter-block">
            <h3>Updated</h3>
            <div id="yearFilters" class="check-list compact"></div>
          </div>
        </aside>

        <section class="results-panel">
          <div class="controls">
            <label class="search">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Try trauma, GP, parenting, disaster..." autocomplete="off">
            </label>
            <label class="select-wrap">
              <span>Sort</span>
              <select id="sortSelect">
                <option value="title">Title A-Z</option>
                <option value="newest">Newest updated</option>
                <option value="oldest">Oldest updated</option>
                <option value="type">Type</option>
              </select>
            </label>
          </div>

          <div class="result-status">
            <p id="resultCount">Loading resources...</p>
            <div class="view-toggle" aria-label="View mode">
              <button id="cardView" type="button" class="active">Cards</button>
              <button id="tableView" type="button">Table</button>
            </div>
          </div>

          <div id="activeFilters" class="active-filters"></div>
          <div id="results" class="cards"></div>

          <div class="pager">
            <button id="prevPage" type="button">Previous</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPage" type="button">Next</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
